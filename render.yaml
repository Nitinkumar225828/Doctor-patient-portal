services:
  - type: web
    name: doctor-patient-portal
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    healthCheckPath: /Doctor-Patient-Portal/
    envVars:
      - key: DB_DRIVER
        value: org.h2.Driver
      - key: DB_URL
        value: jdbc:h2:mem:hospital;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
      - key: BOOTSTRAP_DB
        value: "true"
